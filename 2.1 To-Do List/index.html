<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do List</title>
    <link rel="stylesheet" href="./style.css" />
</head>

<body>
    <div class="app">
        <div id="title" class="header">
            <h1>To-Do List</h1>

            <div class="row">

            </div>
        </div>

        <ul class="list">
        </ul>
    </div>

    <script src="./script.js" defer></script>
</body>

</html>
