<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Theme Switcher</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <div class="container">
        <h1>Theme Switcher</h1>

        <div class="theme-box">
            <button class="theme-btn light" data-theme="light">Light</button>
            <button class="theme-btn dark" data-theme="dark">Dark</button>
            <button class="theme-btn neon" data-theme="neon">Neon</button>
        </div>

        <div class="preview">
            <h2>Preview Area</h2>
            <br>
            <p>Perfection is achieved, not when there is nothing more to add, but when there is nothing left to take
                away.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
