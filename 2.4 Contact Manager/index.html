<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Manager</title>
    <link rel="stylesheet" href="./style.css" />
</head>

<body>
    <div class="container">
        <div class="top-bar">
            <h1>Contact Manager</h1>
        </div>

        <div class="main">
            <div class="add-contact">
                <h2>Add New Contact</h2>

                <h3>Full Name</h3>
                <input type="text" class="name" placeholder="John Doe" />

                <h3>Email Address</h3>
                <input type="email" class="email" placeholder="john@example.com" />

                <h3>Phone Number</h3>
                <input type="text" class="number" placeholder="04666 66666" />

                <button onclick="addBtn()" class="addBtn">Add Contact</button>
            </div>

            <div class="view-contact">
                <h2>My Contacts</h2>
                <ul class="contact-list"></ul>
            </div>
        </div>
    </div>

    <script src="./script.js" defer></script>
</body>

</html>
