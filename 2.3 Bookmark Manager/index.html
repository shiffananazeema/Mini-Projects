<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bookmark Manager</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="app">
        <div class="head">
            <h1>Bookmark Manager</h1>

            <div class="input-box">
                <input type="text" class="input-name" placeholder="Enter bookmark name" />
                <input type="text" class="input-url" placeholder="Enter bookmark URL" />
                <button onclick="addBookmark()">Add Bookmark</button>
            </div>

            <div class="bookmarks">
                <ul class="bookmark-list"></ul>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
