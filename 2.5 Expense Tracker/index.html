<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="container">
        <h1>Expense Tracker</h1>
        <div class="expense-form">
            <input type="text" class="title" placeholder="Expense Title" />
            <input type="number" class="amount" placeholder="Amount" />

            <select class="category">
                <option value="">Select Category</option>
                <option value="Food">Food</option>
                <option value="Transport">Transport</option>
                <option value="Shopping">Shopping</option>
                <option value="Health">Health</option>
                <option value="Bills">Bills</option>
                <option value="Other">Other</option>
            </select>
            <input type="date" class="date" />

            <button class="add-btn" onclick="addExpense()">Add Expense</button>
        </div>

        <div class="summary">
            <h2>Total: $<span class="total">0</span></h2>
        </div>

        <select class="filter">
            <option value="All">All</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Shopping">Shopping</option>
            <option value="Health">Health</option>
            <option value="Bills">Bills</option>
            <option value="Other">Other</option>
        </select>
        <ul class="expense-list"></ul>
    </div>
    <script src="./script.js" defer></script>
</body>

</html>
