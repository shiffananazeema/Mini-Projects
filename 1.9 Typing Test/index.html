<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Test</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Typing Test</h1>

        <div class="content">
            <div class="text"></div>
            <textarea type="text" id="input" autocomplete="off"></textarea>
        </div>

        <div class="stats">
            <div>Time Left: <b class="time">60</b>s</div>
            <div>Mistakes: <b class="mistakes">0</b></div>
            <div>WPM: <b class="wpm">0</b></div>
            <div>CPM: <b class="cpm">0</b></div>
            <div class="btun">
                <button onclick="reset()">Try again</button>
            </div>
        </div>
    </div>
    <script src="paragraphs.js"></script>
    <script src="script.js"></script>
</body>

</html>
