<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multi-Step Form</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <section class="page">
        <div class="left-panel">
            <div class="brand-box">
                <p class="small-text">Step by Step</p>
                <h1>Create Your Account</h1>
                <p class="description">
                    Complete the registration form in three simple steps. Fill in your
                    details carefully and move forward smoothly.
                </p>
            </div>
        </div>

        <div class="right-panel">
            <div class="form-wrapper">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>

                <div class="step-header">
                    <div class="step-circle active" id="indicator0">1</div>
                    <div class="step-circle" id="indicator1">2</div>
                    <div class="step-circle" id="indicator2">3</div>
                </div>

                <form id="multiStepForm">
                    <div class="form-step active">
                        <h2>Personal Details</h2>

                        <div class="input-grid">
                            <div class="input-group full-width">
                                <label for="fullName">Full Name</label>
                                <input type="text" id="fullName" placeholder="Enter your full name" />
                                <small class="error" id="fullNameError"></small>
                            </div>

                            <div class="input-group full-width">
                                <label for="email">Email Address</label>
                                <input type="email" id="email" placeholder="Enter your email address" />
                                <small class="error" id="emailError"></small>
                            </div>
                        </div>

                        <div class="button-row end">
                            <button type="button" class="next-btn">Continue</button>
                        </div>
                    </div>

                    <div class="form-step">
                        <h2>Contact Details</h2>

                        <div class="input-grid two-col">
                            <div class="input-group">
                                <label for="phone">Phone Number</label>
                                <input type="text" id="phone" placeholder="Enter your phone number" />
                                <small class="error" id="phoneError"></small>
                            </div>

                            <div class="input-group">
                                <label for="city">City</label>
                                <input type="text" id="city" placeholder="Enter your city" />
                                <small class="error" id="cityError"></small>
                            </div>
                        </div>

                        <div class="button-row">
                            <button type="button" class="prev-btn">Back</button>
                            <button type="button" class="next-btn">Continue</button>
                        </div>
                    </div>

                    <div class="form-step">
                        <h2>Set Password</h2>

                        <div class="input-grid two-col">
                            <div class="input-group">
                                <label for="password">Password</label>
                                <input type="password" id="password" placeholder="Enter password" />
                                <small class="error" id="passwordError"></small>
                            </div>

                            <div class="input-group">
                                <label for="confirmPassword">Confirm Password</label>
                                <input type="password" id="confirmPassword" placeholder="Confirm password" />
                                <small class="error" id="confirmPasswordError"></small>
                            </div>
                        </div>

                        <div class="button-row">
                            <button type="button" class="prev-btn">Back</button>
                            <button type="submit" class="submit-btn">Create Account</button>
                        </div>
                    </div>
                </form>

                <p id="successMessage"></p>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>

</html>
