<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Gallery</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="container">
        <h1>Image Gallery</h1>
        <br>

        <div class="gallery">
            <div class="image-card">
                <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=800&q=80"
                    alt="Mountain Lake">
            </div>

            <div class="image-card">
                <img src="https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?auto=format&fit=crop&w=800&q=80"
                    alt="City Skyline">
            </div>

            <div class="image-card">
                <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=800&q=80"
                    alt="Hot Air Balloons">
            </div>

            <div class="image-card">
                <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=800&q=80"
                    alt="Forest Waterfall">
            </div>

            <div class="image-card">
                <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=800&q=80"
                    alt="Beach">
            </div>

            <div class="image-card">
                <img src="https://images.unsplash.com/photo-1494526585095-c41746248156?auto=format&fit=crop&w=800&q=80"
                    alt="City Street">
            </div>
        </div>
    </div>

    <div class="modal" id="modal">
        <span class="close-btn" id="closeBtn">&times;</span>
        <img class="modal-img" id="modalImg" src="" alt="Large Preview">
    </div>

    <script src="script.js"></script>
</body>

</html>
